backend:
  name: github
  repo: ksnu-lab/pages
  branch: main

media_folder: "public/images"
public_folder: "/images"

locale: "ko"

collections:
  # ── 홈 ──
  - name: "home"
    label: "홈"
    files:
      - name: "siteConfig"
        label: "사이트 기본 정보"
        file: "src/data/siteConfig.json"
        fields:
          - label: "연구실 이름"
            name: "labName"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "대학교"
            name: "university"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "학과"
            name: "department"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "주소"
            name: "address"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "연구실 소개"
            name: "intro"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "text" }
              - { label: "English", name: "en", widget: "text" }
          - { label: "전화번호", name: "phone", widget: "string" }
          - { label: "이메일", name: "email", widget: "string" }
          - label: "배너"
            name: "banner"
            widget: "object"
            fields:
              - label: "배너 텍스트"
                name: "text"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - { label: "링크", name: "link", widget: "string", hint: "예: /contact" }
              - { label: "활성화", name: "enabled", widget: "boolean", default: true }

  # ── 구성원 ──
  - name: "members"
    label: "구성원"
    files:
      - name: "professor"
        label: "지도교수"
        file: "src/data/professor.json"
        fields:
          - label: "이름"
            name: "name"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - label: "직함"
            name: "title"
            widget: "object"
            fields:
              - { label: "한국어", name: "ko", widget: "string" }
              - { label: "English", name: "en", widget: "string" }
          - { label: "사진", name: "photo", widget: "image", required: false }
          - { label: "이메일", name: "email", widget: "string" }
          - { label: "전화번호", name: "phone", widget: "string" }
          - { label: "연구실 위치", name: "office", widget: "string" }
          - label: "학력"
            name: "education"
            widget: "list"
            summary: "{{fields.degree}} - {{fields.institution}} ({{fields.year}})"
            fields:
              - { label: "학위", name: "degree", widget: "string" }
              - { label: "기관", name: "institution", widget: "string" }
              - { label: "연도", name: "year", widget: "number", value_type: "int" }
          - label: "경력"
            name: "career"
            widget: "list"
            summary: "{{fields.position}} - {{fields.organization}} ({{fields.period}})"
            fields:
              - { label: "직위", name: "position", widget: "string" }
              - { label: "기관", name: "organization", widget: "string" }
              - { label: "기간", name: "period", widget: "string" }
          - label: "연구 관심 분야"
            name: "researchInterests"
            widget: "list"
            field: { label: "분야", name: "interest", widget: "string" }
          - label: "외부 링크"
            name: "links"
            widget: "object"
            fields:
              - { label: "Google Scholar", name: "googleScholar", widget: "string", required: false }
              - { label: "DBLP", name: "dblp", widget: "string", required: false }
              - { label: "ORCID", name: "orcid", widget: "string", required: false }

      - name: "membersList"
        label: "연구실 구성원"
        file: "src/data/members.json"
        fields:
          - label: "구성원 목록"
            name: "members"
            widget: "list"
            summary: "{{fields.name.ko}} ({{fields.role}})"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "고유 식별자 (예: member-5)" }
              - label: "이름"
                name: "name"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - { label: "사진", name: "photo", widget: "image", required: false }
              - { label: "이메일", name: "email", widget: "string" }
              - label: "구분"
                name: "role"
                widget: "select"
                options:
                  - { label: "박사후연구원", value: "postdoc" }
                  - { label: "박사과정", value: "phd" }
                  - { label: "석사과정", value: "ms" }
                  - { label: "학부연구생", value: "undergraduate" }
              - { label: "입학 연도", name: "enrollYear", widget: "number", value_type: "int" }
              - label: "연구 관심 분야"
                name: "researchInterests"
                widget: "list"
                field: { label: "분야", name: "interest", widget: "string" }
              - { label: "홈페이지", name: "homepage", widget: "string", required: false }

      - name: "alumniList"
        label: "졸업생"
        file: "src/data/alumni.json"
        fields:
          - label: "졸업생 목록"
            name: "alumni"
            widget: "list"
            summary: "{{fields.name.ko}} ({{fields.degree}}, {{fields.graduationYear}})"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "고유 식별자 (예: alumni-4)" }
              - label: "이름"
                name: "name"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "학위"
                name: "degree"
                widget: "select"
                options: ["PhD", "MS"]
              - { label: "입학 연도", name: "enrollYear", widget: "number", value_type: "int" }
              - { label: "졸업 연도", name: "graduationYear", widget: "number", value_type: "int" }
              - { label: "현 소속", name: "currentAffiliation", widget: "string", required: false }
              - { label: "현 직위", name: "currentPosition", widget: "string", required: false }
              - { label: "논문 제목", name: "thesisTitle", widget: "string", required: false }

  # ── 연구 분야 ──
  - name: "research"
    label: "연구 분야"
    files:
      - name: "researchAreas"
        label: "연구 분야 목록"
        file: "src/data/research.json"
        fields:
          - label: "연구 분야"
            name: "research"
            widget: "list"
            summary: "{{fields.title.ko}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "고유 식별자 (예: cryptography)" }
              - label: "분야명"
                name: "title"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "설명"
                name: "description"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "text" }
                  - { label: "English", name: "en", widget: "text" }
              - { label: "이미지", name: "image", widget: "image", required: false }
              - label: "키워드"
                name: "keywords"
                widget: "list"
                field: { label: "키워드", name: "keyword", widget: "string" }

  # ── 해킹 기술 ──
  - name: "roadmap"
    label: "해킹 기술"
    files:
      - name: "roadmapData"
        label: "보안 기술 소개"
        file: "src/data/roadmap.json"
        fields:
          - label: "분야"
            name: "categories"
            widget: "list"
            summary: "{{fields.title.ko}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "고유 식별자 (예: system-hacking)" }
              - label: "분야명"
                name: "title"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - label: "색상"
                name: "color"
                widget: "select"
                options:
                  - { label: "빨강", value: "red" }
                  - { label: "파랑", value: "blue" }
                  - { label: "초록", value: "green" }
                  - { label: "보라", value: "purple" }
                default: "blue"
              - label: "기술 목록"
                name: "techniques"
                widget: "list"
                summary: "{{fields.name.ko}}"
                fields:
                  - { label: "ID", name: "id", widget: "string", hint: "고유 식별자 (예: buffer-overflow)" }
                  - label: "기술명"
                    name: "name"
                    widget: "object"
                    fields:
                      - { label: "한국어", name: "ko", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "설명"
                    name: "description"
                    widget: "object"
                    fields:
                      - { label: "한국어", name: "ko", widget: "text" }
                      - { label: "English", name: "en", widget: "text" }
                  - { label: "이미지", name: "image", widget: "image" }

  # ── 연구 성과 ──
  - name: "publications"
    label: "연구 성과"
    files:
      - name: "papers"
        label: "논문 성과"
        file: "src/data/papers.json"
        fields:
          - label: "논문 목록"
            name: "papers"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "고유 식별자 (예: pub-16)" }
              - { label: "제목", name: "title", widget: "string", required: true }
              - { label: "저자", name: "authors", widget: "string", required: false, hint: "예: 홍길동, 김철수, 이영희" }
              - { label: "학술지/학회", name: "venue", widget: "string", required: true }
              - { label: "연도", name: "year", widget: "number", value_type: "int", required: true }
              - label: "구분"
                name: "type"
                widget: "select"
                options:
                  - { label: "국제 논문", value: "international" }
                  - { label: "국내 논문", value: "domestic" }
                default: "international"
      - name: "awards"
        label: "수상 성과"
        file: "src/data/awards.json"
        fields:
          - label: "수상 목록"
            name: "awards"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "고유 식별자 (예: award-9)" }
              - { label: "수상명", name: "title", widget: "string", required: true }
              - { label: "수상자", name: "authors", widget: "string", required: false, hint: "예: 홍길동, 김철수" }
              - { label: "수여기관/학회", name: "venue", widget: "string", required: true }
              - { label: "연도", name: "year", widget: "number", value_type: "int", required: true }
      - name: "patents"
        label: "지식재산권"
        file: "src/data/patents.json"
        fields:
          - label: "지식재산권 목록"
            name: "patents"
            widget: "list"
            summary: "{{fields.subtype}} | {{fields.title}} ({{fields.year}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "고유 식별자 (예: ip-1)" }
              - label: "분류"
                name: "subtype"
                widget: "select"
                required: true
                default: "patent"
                options:
                  - { label: "특허", value: "patent" }
                  - { label: "저작권", value: "copyright" }
                  - { label: "기타", value: "other" }
              - { label: "명칭", name: "title", widget: "string", required: true }
              - { label: "발명자/저작자", name: "authors", widget: "string", required: false, hint: "예: 홍길동, 김철수" }
              - { label: "출원기관/등록처", name: "venue", widget: "string", required: true }
              - { label: "연도", name: "year", widget: "number", value_type: "int", required: true }
      - name: "others"
        label: "기타 성과"
        file: "src/data/others.json"
        fields:
          - label: "기타 목록"
            name: "others"
            widget: "list"
            summary: "{{fields.title}} ({{fields.year}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "고유 식별자 (예: other-1)" }
              - { label: "제목", name: "title", widget: "string", required: true }
              - { label: "관련자", name: "authors", widget: "string", required: false, hint: "예: 홍길동, 김철수" }
              - { label: "출처/기관", name: "venue", widget: "string", required: true }
              - { label: "연도", name: "year", widget: "number", value_type: "int", required: true }

  # ── 프로젝트 ──
  - name: "projects"
    label: "프로젝트"
    files:
      - name: "projectsList"
        label: "과제 목록"
        file: "src/data/projects.json"
        fields:
          - label: "과제 목록"
            name: "projects"
            widget: "list"
            summary: "{{fields.title.ko}} ({{fields.period}})"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "고유 식별자 (예: project-17)" }
              - label: "과제명"
                name: "title"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string", required: true }
                  - { label: "English", name: "en", widget: "string", required: true }
              - label: "위탁기관"
                name: "funder"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "string", required: true }
                  - { label: "English", name: "en", widget: "string", required: true }
              - { label: "기간", name: "period", widget: "string", required: true, hint: "예: 2022.01 - 2024.12" }
              - label: "설명"
                name: "description"
                widget: "object"
                fields:
                  - { label: "한국어", name: "ko", widget: "text", required: false }
                  - { label: "English", name: "en", widget: "text", required: false }

  # ── 연구실 소식 ──
  - name: "news-announcement"
    label: "연구실 소식 — 공지"
    files:
      - name: "announcementPosts"
        label: "공지 목록"
        file: "src/data/news-announcement.json"
        fields:
          - label: "공지 목록"
            name: "posts"
            widget: "list"
            summary: "{{fields.title_ko}} ({{fields.date}})"
            fields:
              - { label: "ID (슬러그)", name: "id", widget: "string", hint: "영문·숫자·하이픈만 사용 (예: ann-2026-01)" }
              - { label: "제목 (한국어)", name: "title_ko", widget: "string" }
              - { label: "Title (English)", name: "title_en", widget: "string", required: false }
              - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "요약 (한국어)", name: "summary_ko", widget: "string", required: false }
              - { label: "Summary (English)", name: "summary_en", widget: "string", required: false }
              - { label: "본문 (한국어)", name: "body_ko", widget: "markdown", required: false }
              - { label: "Body (English)", name: "body_en", widget: "markdown", required: false }
              - { label: "썸네일", name: "thumbnail", widget: "image", required: false }
              - { label: "외부 링크", name: "link", widget: "string", required: false, hint: "클릭 시 이동할 외부 URL (선택)" }
              - { label: "홈 고정", name: "pinned", widget: "boolean", default: false, required: false }

  - name: "news-research"
    label: "연구실 소식 — 연구내용"
    files:
      - name: "researchPosts"
        label: "연구내용 목록"
        file: "src/data/news-research.json"
        fields:
          - label: "연구내용 목록"
            name: "posts"
            widget: "list"
            summary: "{{fields.title_ko}} ({{fields.date}})"
            fields:
              - { label: "ID (슬러그)", name: "id", widget: "string", hint: "영문·숫자·하이픈만 사용 (예: research-2026-01)" }
              - { label: "제목 (한국어)", name: "title_ko", widget: "string" }
              - { label: "Title (English)", name: "title_en", widget: "string", required: false }
              - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "요약 (한국어)", name: "summary_ko", widget: "string", required: false }
              - { label: "Summary (English)", name: "summary_en", widget: "string", required: false }
              - { label: "본문 (한국어)", name: "body_ko", widget: "markdown", required: false }
              - { label: "Body (English)", name: "body_en", widget: "markdown", required: false }
              - { label: "썸네일", name: "thumbnail", widget: "image", required: false }
              - { label: "외부 링크", name: "link", widget: "string", required: false }
              - { label: "홈 고정", name: "pinned", widget: "boolean", default: false, required: false }

  - name: "news-seminar"
    label: "연구실 소식 — 세미나"
    files:
      - name: "seminarPosts"
        label: "세미나 목록"
        file: "src/data/news-seminar.json"
        fields:
          - label: "세미나 목록"
            name: "posts"
            widget: "list"
            summary: "{{fields.title_ko}} ({{fields.date}})"
            fields:
              - { label: "ID (슬러그)", name: "id", widget: "string", hint: "영문·숫자·하이픈만 사용 (예: seminar-2026-01)" }
              - { label: "제목 (한국어)", name: "title_ko", widget: "string" }
              - { label: "Title (English)", name: "title_en", widget: "string", required: false }
              - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "요약 (한국어)", name: "summary_ko", widget: "string", required: false }
              - { label: "Summary (English)", name: "summary_en", widget: "string", required: false }
              - { label: "본문 (한국어)", name: "body_ko", widget: "markdown", required: false }
              - { label: "Body (English)", name: "body_en", widget: "markdown", required: false }
              - { label: "썸네일", name: "thumbnail", widget: "image", required: false }
              - { label: "외부 링크", name: "link", widget: "string", required: false }
              - { label: "홈 고정", name: "pinned", widget: "boolean", default: false, required: false }

  - name: "news-general"
    label: "연구실 소식 — 일반"
    files:
      - name: "generalPosts"
        label: "일반 목록"
        file: "src/data/news-general.json"
        fields:
          - label: "일반 목록"
            name: "posts"
            widget: "list"
            summary: "{{fields.title_ko}} ({{fields.date}})"
            fields:
              - { label: "ID (슬러그)", name: "id", widget: "string", hint: "영문·숫자·하이픈만 사용 (예: general-2026-01)" }
              - { label: "제목 (한국어)", name: "title_ko", widget: "string" }
              - { label: "Title (English)", name: "title_en", widget: "string", required: false }
              - { label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "요약 (한국어)", name: "summary_ko", widget: "string", required: false }
              - { label: "Summary (English)", name: "summary_en", widget: "string", required: false }
              - { label: "본문 (한국어)", name: "body_ko", widget: "markdown", required: false }
              - { label: "Body (English)", name: "body_en", widget: "markdown", required: false }
              - { label: "썸네일", name: "thumbnail", widget: "image", required: false }
              - { label: "외부 링크", name: "link", widget: "string", required: false }
              - { label: "홈 고정", name: "pinned", widget: "boolean", default: false, required: false }

  # ── 지원 안내 ──
  - name: "faq"
    label: "지원 안내"
    folder: "src/content/faq"
    create: true
    slug: "{{fields.order}}-{{slug}}"
    identifier_field: "question_ko"
    extension: "mdx"
    format: "frontmatter"
    sortable_fields: ["order"]
    fields:
      - label: "질문 (한국어)"
        name: "question_ko"
        widget: "string"
        required: true

      - label: "Question (English)"
        name: "question_en"
        widget: "string"
        required: false

      - label: "답변 (한국어)"
        name: "answer_ko"
        widget: "text"
        required: true

      - label: "Answer (English)"
        name: "answer_en"
        widget: "text"
        required: false

      - label: "순서"
        name: "order"
        widget: "number"
        value_type: "int"
        required: true
        hint: "낮은 숫자가 위에 표시됩니다"
