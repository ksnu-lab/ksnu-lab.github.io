<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base gradient: light blue-white -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f6ff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#e8f0fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dce8fd;stop-opacity:1" />
    </linearGradient>
    <!-- Soft glow left -->
    <radialGradient id="glowL" cx="20%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.07" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <!-- Soft glow right (security visual area) -->
    <radialGradient id="glowR" cx="80%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    <!-- Dot grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#6366f1" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1440" height="800" fill="url(#bg)"/>
  <rect width="1440" height="800" fill="url(#grid)"/>
  <rect width="1440" height="800" fill="url(#glowL)"/>
  <rect width="1440" height="800" fill="url(#glowR)"/>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE: Security illustration cluster (800~1380, 60~740) -->
  <!-- ============================================================ -->

  <!-- === Large central SHIELD === -->
  <g transform="translate(1050, 320)" opacity="0.13">
    <path d="M0,-140 L110,-90 L110,40 Q110,120 0,160 Q-110,120 -110,40 L-110,-90 Z"
          fill="#3b82f6" stroke="#2563eb" stroke-width="4"/>
    <!-- Lock icon inside shield -->
    <rect x="-28" y="-20" width="56" height="44" rx="8" fill="none" stroke="#1e40af" stroke-width="5"/>
    <path d="M-18,-20 L-18,-42 Q-18,-72 0,-72 Q18,-72 18,-42 L18,-20"
          fill="none" stroke="#1e40af" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="12" r="9" fill="#1e40af"/>
  </g>

  <!-- === Network nodes + connections === -->
  <!-- Central hub -->
  <circle cx="980" cy="200" r="14" fill="#3b82f6" opacity="0.18"/>
  <!-- Spokes -->
  <line x1="980" y1="200" x2="860" y2="130" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="980" y1="200" x2="1100" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="980" y1="200" x2="1180" y2="260" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="980" y1="200" x2="900" y2="340" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="980" y1="200" x2="1060" y2="380" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <!-- Satellite nodes -->
  <circle cx="860" cy="130" r="9" fill="#6366f1" opacity="0.18"/>
  <circle cx="1100" cy="110" r="11" fill="#6366f1" opacity="0.18"/>
  <circle cx="1180" cy="260" r="8" fill="#6366f1" opacity="0.18"/>
  <circle cx="900" cy="340" r="10" fill="#6366f1" opacity="0.18"/>
  <circle cx="1060" cy="380" r="9" fill="#6366f1" opacity="0.18"/>
  <!-- Second-level connections -->
  <line x1="860" y1="130" x2="820" y2="60" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="1100" y1="110" x2="1200" y2="80" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="1180" y1="260" x2="1300" y2="220" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <line x1="900" y1="340" x2="820" y2="430" stroke="#6366f1" stroke-width="1" opacity="0.10"/>
  <circle cx="820" cy="60" r="5" fill="#818cf8" opacity="0.18"/>
  <circle cx="1200" cy="80" r="6" fill="#818cf8" opacity="0.18"/>
  <circle cx="1300" cy="220" r="5" fill="#818cf8" opacity="0.18"/>
  <circle cx="820" cy="430" r="6" fill="#818cf8" opacity="0.18"/>

  <!-- === Circuit board traces (bottom right) === -->
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.12">
    <polyline points="900,600 900,560 960,560 960,520 1080,520"/>
    <polyline points="1080,520 1080,480 1160,480 1160,440"/>
    <polyline points="960,560 960,620 1100,620 1100,660 1240,660"/>
    <polyline points="1160,440 1240,440 1240,380"/>
    <polyline points="1100,620 1100,700 1200,700"/>
    <!-- Junction dots -->
    <circle cx="960" cy="560" r="4" fill="#3b82f6"/>
    <circle cx="1080" cy="520" r="4" fill="#3b82f6"/>
    <circle cx="1160" cy="480" r="4" fill="#3b82f6"/>
    <circle cx="960" cy="620" r="4" fill="#3b82f6"/>
    <circle cx="1100" cy="620" r="4" fill="#3b82f6"/>
    <circle cx="1100" cy="700" r="4" fill="#3b82f6"/>
    <circle cx="1240" cy="440" r="4" fill="#3b82f6"/>
    <circle cx="1240" cy="660" r="4" fill="#3b82f6"/>
  </g>

  <!-- === Binary / hex floating text (subtle) === -->
  <g font-family="monospace" fill="#3b82f6" opacity="0.07" font-size="13">
    <text x="820" y="520">10110100</text>
    <text x="1150" y="560">0xAF3C</text>
    <text x="1260" y="480">11001011</text>
    <text x="860" y="680">0xFF2E</text>
    <text x="1100" y="160">10101010</text>
    <text x="1250" y="340">0xB4D2</text>
    <text x="800" y="380">11110000</text>
    <text x="1320" y="640">01011010</text>
  </g>

  <!-- === Small lock icons scattered === -->
  <!-- Lock 1 (top area) -->
  <g transform="translate(1320, 120)" opacity="0.12">
    <rect x="-16" y="-8" width="32" height="26" rx="5" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <path d="M-10,-8 L-10,-20 Q-10,-34 0,-34 Q10,-34 10,-20 L10,-8" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="6" r="4.5" fill="#3b82f6"/>
  </g>
  <!-- Lock 2 -->
  <g transform="translate(830, 240)" opacity="0.10">
    <rect x="-12" y="-6" width="24" height="20" rx="4" fill="none" stroke="#6366f1" stroke-width="2"/>
    <path d="M-8,-6 L-8,-16 Q-8,-26 0,-26 Q8,-26 8,-16 L8,-6" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="4" r="3.5" fill="#6366f1"/>
  </g>
  <!-- Lock 3 -->
  <g transform="translate(1370, 460)" opacity="0.10">
    <rect x="-14" y="-7" width="28" height="22" rx="4" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M-9,-7 L-9,-17 Q-9,-30 0,-30 Q9,-30 9,-17 L9,-7" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="5" r="4" fill="#3b82f6"/>
  </g>

  <!-- === Key icon === -->
  <g transform="translate(1280, 580) rotate(-35)" opacity="0.11">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#6366f1" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#6366f1" stroke-width="3"/>
    <line x1="22" y1="0" x2="70" y2="0" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="0" x2="55" y2="12" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="68" y1="0" x2="68" y2="10" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- === Fingerprint-like concentric arcs (top right) === -->
  <g transform="translate(1380, 80)" fill="none" stroke="#6366f1" opacity="0.09">
    <path d="M-60,0 Q-60,-80 0,-80 Q60,-80 60,0" stroke-width="2.5"/>
    <path d="M-44,0 Q-44,-58 0,-58 Q44,-58 44,0" stroke-width="2"/>
    <path d="M-30,0 Q-30,-38 0,-38 Q30,-38 30,0" stroke-width="2"/>
    <path d="M-16,0 Q-16,-20 0,-20 Q16,-20 16,0" stroke-width="1.5"/>
  </g>

  <!-- === Subtle large ring decoration === -->
  <circle cx="1050" cy="400" r="240" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.05" stroke-dasharray="8 12"/>
  <circle cx="1050" cy="400" r="300" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.04" stroke-dasharray="4 16"/>

  <!-- ============================================================ -->
  <!-- LEFT subtle decoration (very faint, behind text area)       -->
  <!-- ============================================================ -->
  <circle cx="200" cy="600" r="180" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.04" stroke-dasharray="6 14"/>
  <circle cx="60" cy="200" r="100" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.05" stroke-dasharray="4 10"/>
</svg>
