<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg-ai" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="accent-ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg-ai)"/>
  <!-- Neural network nodes - layer 1 (input) -->
  <circle cx="95" cy="75" r="11" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="95" cy="125" r="11" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="95" cy="175" r="11" fill="#8b5cf6" opacity="0.75"/>
  <!-- Neural network nodes - layer 2 (hidden) -->
  <circle cx="190" cy="90" r="11" fill="#7c3aed" opacity="0.8"/>
  <circle cx="190" cy="125" r="11" fill="#7c3aed" opacity="0.85"/>
  <circle cx="190" cy="160" r="11" fill="#7c3aed" opacity="0.8"/>
  <!-- Neural network nodes - layer 3 (output) -->
  <circle cx="285" cy="125" r="14" fill="url(#accent-ai)" opacity="0.95"/>
  <!-- Connections layer 1 -> 2 -->
  <line x1="106" y1="75"  x2="179" y2="90"  stroke="#a78bfa" stroke-width="1.4" opacity="0.45"/>
  <line x1="106" y1="75"  x2="179" y2="125" stroke="#a78bfa" stroke-width="1.4" opacity="0.3"/>
  <line x1="106" y1="75"  x2="179" y2="160" stroke="#a78bfa" stroke-width="1.4" opacity="0.25"/>
  <line x1="106" y1="125" x2="179" y2="90"  stroke="#a78bfa" stroke-width="1.4" opacity="0.35"/>
  <line x1="106" y1="125" x2="179" y2="125" stroke="#a78bfa" stroke-width="1.6" opacity="0.55"/>
  <line x1="106" y1="125" x2="179" y2="160" stroke="#a78bfa" stroke-width="1.4" opacity="0.35"/>
  <line x1="106" y1="175" x2="179" y2="90"  stroke="#a78bfa" stroke-width="1.4" opacity="0.25"/>
  <line x1="106" y1="175" x2="179" y2="125" stroke="#a78bfa" stroke-width="1.4" opacity="0.3"/>
  <line x1="106" y1="175" x2="179" y2="160" stroke="#a78bfa" stroke-width="1.4" opacity="0.45"/>
  <!-- Connections layer 2 -> 3 -->
  <line x1="201" y1="90"  x2="271" y2="125" stroke="#a78bfa" stroke-width="1.8" opacity="0.55"/>
  <line x1="201" y1="125" x2="271" y2="125" stroke="#a78bfa" stroke-width="2"   opacity="0.65"/>
  <line x1="201" y1="160" x2="271" y2="125" stroke="#a78bfa" stroke-width="1.8" opacity="0.55"/>
  <!-- Shield around output node -->
  <path d="M285 86 L318 98 L316 142 L285 162 L254 142 L252 98 Z" stroke="#5b21b6" stroke-width="2" fill="#7c3aed" fill-opacity="0.12"/>
  <!-- Checkmark in shield -->
  <polyline points="272,125 282,135 299,114" stroke="#5b21b6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data flow arrow left -->
  <g opacity="0.4">
    <line x1="50" y1="125" x2="74" y2="125" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="69,120 74,125 69,130" stroke="#6d28d9" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Data flow arrow right -->
  <g opacity="0.4">
    <line x1="308" y1="125" x2="332" y2="125" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="327,120 332,125 327,130" stroke="#6d28d9" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Warning triangle bottom-right -->
  <g transform="translate(348, 152)" opacity="0.38">
    <polygon points="0,-13 11,8 -11,8" stroke="#6d28d9" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-6" x2="0" y2="2" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="5" r="1" fill="#6d28d9"/>
  </g>
  <!-- Mini circuit top-right -->
  <g opacity="0.28">
    <circle cx="335" cy="58" r="4" fill="#8b5cf6"/>
    <circle cx="358" cy="42" r="3" fill="#8b5cf6"/>
    <circle cx="352" cy="78" r="3" fill="#8b5cf6"/>
    <line x1="335" y1="58" x2="358" y2="42" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="335" y1="58" x2="352" y2="78" stroke="#8b5cf6" stroke-width="1"/>
  </g>
  <!-- Dots -->
  <circle cx="44" cy="44" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="372" cy="218" r="2" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="48" cy="210" r="1.5" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="200" cy="30" r="1.5" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="200" cy="232" r="1.5" fill="#c4b5fd" opacity="0.3"/>
  <!-- Label hint -->
  <text x="128" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9" opacity="0.3">AI + Security</text>
</svg>
