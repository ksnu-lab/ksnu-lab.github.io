<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#faf5ff"/>
  <!-- Chip/IC -->
  <rect x="40" y="25" width="40" height="30" rx="4" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="60" y="44" text-anchor="middle" font-size="8" font-weight="bold" fill="#5b21b6">AES</text>
  <!-- Pins -->
  <line x1="45" y1="55" x2="45" y2="62" stroke="#7c3aed" stroke-width="2"/>
  <line x1="55" y1="55" x2="55" y2="62" stroke="#7c3aed" stroke-width="2"/>
  <line x1="65" y1="55" x2="65" y2="62" stroke="#7c3aed" stroke-width="2"/>
  <line x1="75" y1="55" x2="75" y2="62" stroke="#7c3aed" stroke-width="2"/>
  <!-- Power trace waveform -->
  <polyline points="15,85 22,85 24,72 27,92 30,78 33,88 36,75 39,90 42,80 45,70 48,95 51,75 54,85 57,72 60,90 63,78 66,68 69,92 72,80 75,75 78,88 81,72 84,85 87,80 90,85 93,78 96,85 99,82 102,85 105,85" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Measurement probe -->
  <line x1="55" y1="62" x2="45" y2="80" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Key extraction label -->
  <text x="60" y="105" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">Key = 0x3F...</text>
</svg>
