<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#faf5ff"/>
  <!-- Lock -->
  <path d="M50 55 Q50 40 60 38 Q70 40 70 55" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <rect x="45" y="55" width="30" height="25" rx="4" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="60" cy="65" r="3" fill="#7c3aed"/>
  <line x1="60" y1="68" x2="60" y2="73" stroke="#7c3aed" stroke-width="2"/>
  <!-- Keys trying -->
  <rect x="18" y="25" width="20" height="10" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="28" y="33" text-anchor="middle" font-size="6" font-family="monospace" fill="#dc2626">0000</text>
  <rect x="18" y="38" width="20" height="10" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="28" y="46" text-anchor="middle" font-size="6" font-family="monospace" fill="#dc2626">0001</text>
  <rect x="18" y="51" width="20" height="10" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="28" y="59" text-anchor="middle" font-size="6" font-family="monospace" fill="#dc2626">0002</text>
  <text x="28" y="72" text-anchor="middle" font-size="10" fill="#9ca3af">...</text>
  <rect x="18" y="78" width="20" height="10" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
  <text x="28" y="86" text-anchor="middle" font-size="6" font-family="monospace" fill="#166534">KEY!</text>
  <!-- Arrow from correct key -->
  <path d="M38 83 L44 70" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Try arrows -->
  <path d="M38 30 L44 55" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <path d="M38 43 L44 58" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <!-- Counter -->
  <text x="90" y="90" text-anchor="middle" font-size="7" font-family="monospace" fill="#7c3aed">2^128</text>
  <text x="90" y="99" text-anchor="middle" font-size="6" fill="#9ca3af">tries</text>
</svg>
