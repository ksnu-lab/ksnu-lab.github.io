<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#eff6ff"/>
  <!-- ARP table -->
  <rect x="20" y="20" width="80" height="50" rx="5" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="60" y="33" text-anchor="middle" font-size="8" font-weight="bold" fill="#1e40af">ARP Table</text>
  <line x1="25" y1="37" x2="95" y2="37" stroke="#dbeafe" stroke-width="1"/>
  <!-- Table rows -->
  <text x="28" y="47" font-size="6" font-family="monospace" fill="#374151">192.168.1.1</text>
  <text x="78" y="47" font-size="6" font-family="monospace" fill="#22c55e">AA:BB</text>
  <text x="28" y="57" font-size="6" font-family="monospace" fill="#374151">192.168.1.1</text>
  <text x="78" y="57" font-size="6" font-family="monospace" fill="#ef4444">CC:DD</text>
  <!-- Strikethrough on real entry -->
  <line x1="25" y1="46" x2="97" y2="46" stroke="#ef4444" stroke-width="1"/>
  <!-- Fake ARP reply arrow -->
  <rect x="25" y="78" width="70" height="20" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="91" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">Fake ARP Reply</text>
  <path d="M60 78 L60 70" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
  <polygon points="57,72 63,72 60,68" fill="#ef4444"/>
</svg>
