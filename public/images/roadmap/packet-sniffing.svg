<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#eff6ff"/>
  <!-- Network line -->
  <line x1="15" y1="55" x2="105" y2="55" stroke="#93c5fd" stroke-width="3"/>
  <!-- Packets on wire -->
  <rect x="20" y="48" width="18" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="29" y="58" text-anchor="middle" font-size="6" font-family="monospace" fill="#1e40af">PKT</text>
  <rect x="50" y="48" width="18" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="59" y="58" text-anchor="middle" font-size="6" font-family="monospace" fill="#1e40af">PKT</text>
  <rect x="80" y="48" width="18" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="89" y="58" text-anchor="middle" font-size="6" font-family="monospace" fill="#1e40af">PKT</text>
  <!-- Sniffer eye -->
