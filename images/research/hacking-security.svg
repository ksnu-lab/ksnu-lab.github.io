<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg-hk" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
    <linearGradient id="accent-hk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg-hk)"/>
  <!-- Terminal window frame -->
  <rect x="100" y="65" width="200" height="130" rx="8" fill="#4c0519" opacity="0.88"/>
  <!-- Terminal title bar -->
  <rect x="100" y="65" width="200" height="24" rx="8" fill="#881337" opacity="0.95"/>
  <rect x="100" y="77" width="200" height="12" fill="#881337" opacity="0.95"/>
  <!-- Traffic light dots -->
  <circle cx="118" cy="77" r="4.5" fill="#ef4444" opacity="0.85"/>
  <circle cx="132" cy="77" r="4.5" fill="#f59e0b" opacity="0.85"/>
  <circle cx="146" cy="77" r="4.5" fill="#22c55e" opacity="0.85"/>
  <!-- Terminal text lines -->
  <text x="114" y="107" font-family="monospace" font-size="9.5" fill="#fda4af" opacity="0.9">$ nmap -sV 192.168.1.0/24</text>
  <text x="114" y="121" font-family="monospace" font-size="9.5" fill="#fecdd3" opacity="0.7">PORT   STATE  SERVICE</text>
  <text x="114" y="135" font-family="monospace" font-size="9.5" fill="#fecdd3" opacity="0.7">80/tcp open   http</text>
  <text x="114" y="149" font-family="monospace" font-size="9.5" fill="#fecdd3" opacity="0.7">443/tcp open  https</text>
  <text x="114" y="163" font-family="monospace" font-size="9.5" fill="#fda4af" opacity="0.9">$ </text>
  <!-- Cursor blink rect -->
  <rect x="122" y="155" width="6" height="10" rx="1" fill="#fda4af" opacity="0.75"/>
  <!-- Network nodes left -->
  <circle cx="52" cy="90" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <circle cx="52" cy="130" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <circle cx="52" cy="170" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <line x1="61" y1="90"  x2="100" y2="100" stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="61" y1="130" x2="100" y2="130" stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="61" y1="170" x2="100" y2="160" stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="99"  x2="52" y2="121" stroke="#e11d48" stroke-width="1.2" opacity="0.35"/>
  <line x1="52" y1="139" x2="52" y2="161" stroke="#e11d48" stroke-width="1.2" opacity="0.35"/>
  <!-- Network nodes right -->
  <circle cx="348" cy="90" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <circle cx="348" cy="130" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <circle cx="348" cy="170" r="9" stroke="#e11d48" stroke-width="2" fill="#fecdd3" opacity="0.75"/>
  <line x1="300" y1="100" x2="339" y2="90"  stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="130" x2="339" y2="130" stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="160" x2="339" y2="170" stroke="#e11d48" stroke-width="1.5" opacity="0.5"/>
  <line x1="348" y1="99"  x2="348" y2="121" stroke="#e11d48" stroke-width="1.2" opacity="0.35"/>
  <line x1="348" y1="139" x2="348" y2="161" stroke="#e11d48" stroke-width="1.2" opacity="0.35"/>
  <!-- Bug icon bottom-left -->
  <g transform="translate(68, 200)" opacity="0.45">
    <ellipse cx="0" cy="4" rx="7" ry="9" stroke="#e11d48" stroke-width="1.8" fill="none"/>
    <circle cx="0" cy="-5" r="4.5" stroke="#e11d48" stroke-width="1.8" fill="none"/>
    <line x1="-7" y1="0"  x2="-14" y2="-4" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="4"  x2="-14" y2="4"  stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="9"  x2="-14" y2="13" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="0"  x2="14"  y2="-4" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="4"  x2="14"  y2="4"  stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="9"  x2="14"  y2="13" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Shield icon bottom-right -->
  <g transform="translate(320, 190)" opacity="0.4">
    <path d="M0,-18 L16,-8 L14,10 L0,20 L-14,10 L-16,-8 Z" stroke="#be123c" stroke-width="2" fill="none"/>
    <polyline points="-7,3 -1,10 10,-5" stroke="#be123c" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Dots -->
  <circle cx="45" cy="42" r="2" fill="#fda4af" opacity="0.45"/>
  <circle cx="358" cy="38" r="2" fill="#fda4af" opacity="0.45"/>
  <circle cx="40" cy="228" r="2" fill="#fda4af" opacity="0.35"/>
  <circle cx="362" cy="228" r="2" fill="#fda4af" opacity="0.35"/>
  <circle cx="200" cy="30"  r="1.5" fill="#fda4af" opacity="0.3"/>
  <circle cx="200" cy="232" r="1.5" fill="#fda4af" opacity="0.3"/>
</svg>
