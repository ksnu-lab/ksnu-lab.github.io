<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg-csc" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="accent-csc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg-csc)"/>
  <!-- Lock body -->
  <rect x="165" y="78" width="70" height="55" rx="8" fill="url(#accent-csc)" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M180 78 V58 A20 20 0 0 1 220 58 V78" stroke="#0d9488" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="200" cy="99" r="7" fill="#ccfbf1"/>
  <rect x="197" y="103" width="6" height="12" rx="2" fill="#ccfbf1"/>
  <!-- Binary digits -->
  <text x="78" y="60" font-family="monospace" font-size="13" fill="#5eead4" opacity="0.7">01</text>
  <text x="108" y="130" font-family="monospace" font-size="11" fill="#5eead4" opacity="0.5">10</text>
  <text x="58" y="175" font-family="monospace" font-size="13" fill="#5eead4" opacity="0.6">11</text>
  <text x="308" y="68" font-family="monospace" font-size="11" fill="#5eead4" opacity="0.5">10</text>
  <text x="320" y="130" font-family="monospace" font-size="13" fill="#5eead4" opacity="0.6">01</text>
  <text x="128" y="48" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.4">0110</text>
  <text x="265" y="48" font-family="monospace" font-size="10" fill="#5eead4" opacity="0.4">1001</text>
  <!-- Power waveform below lock -->
  <polyline points="38,195 52,195 56,175 61,212 67,178 72,198 78,183 84,205 90,176 97,197 104,186 112,200 120,180 128,195 145,195 150,172 156,215 163,180 170,198 178,174 185,207 193,182 200,196 208,174 216,207 224,184 232,197 248,197 254,173 260,216 267,179 274,198 281,176 288,210 296,183 303,197 310,186 318,200 325,195 342,195 348,178 354,205 360,195" stroke="#0d9488" stroke-width="1.8" fill="none" opacity="0.6"/>
  <!-- EM arcs right of lock -->
  <path d="M255 88 Q270 73 255 58" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M265 93 Q284 73 265 53" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M275 98 Q299 73 275 48" stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Magnifying glass -->
  <g transform="translate(318, 88)" opacity="0.45">
    <circle cx="0" cy="0" r="14" stroke="#0f766e" stroke-width="2" fill="none"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Key floating left -->
  <g transform="translate(90, 93) rotate(-20)" opacity="0.5">
    <circle cx="0" cy="0" r="10" stroke="#2dd4bf" stroke-width="2" fill="none"/>
    <line x1="10" y1="0" x2="36" y2="0" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="0" x2="28" y2="7" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="0" x2="34" y2="5" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Dots -->
  <circle cx="48" cy="45" r="2" fill="#5eead4" opacity="0.4"/>
  <circle cx="355" cy="40" r="2" fill="#5eead4" opacity="0.4"/>
  <circle cx="42" cy="230" r="2" fill="#5eead4" opacity="0.3"/>
  <circle cx="358" cy="228" r="2" fill="#5eead4" opacity="0.3"/>
  <circle cx="200" cy="32" r="1.5" fill="#5eead4" opacity="0.3"/>
</svg>
