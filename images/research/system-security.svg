<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg-ss" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="accent-ss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg-ss)"/>

  <!-- Stack memory frames (central) -->
  <rect x="155" y="58" width="90" height="20" rx="3" fill="#d97706" opacity="0.55"/>
  <rect x="155" y="81" width="90" height="20" rx="3" fill="#d97706" opacity="0.65"/>
  <!-- Return address — red (corrupted) -->
  <rect x="155" y="104" width="90" height="20" rx="3" fill="#ef4444" opacity="0.80"/>
  <rect x="155" y="127" width="90" height="20" rx="3" fill="#d97706" opacity="0.55"/>
  <!-- Buffer — overflowed -->
  <rect x="155" y="150" width="90" height="30" rx="3" fill="url(#accent-ss)" opacity="0.80"/>

  <!-- Frame labels -->
  <text x="200" y="72"  font-family="monospace" font-size="8.5" fill="#fef3c7" text-anchor="middle" opacity="0.9">saved RBP</text>
  <text x="200" y="95"  font-family="monospace" font-size="8.5" fill="#fef3c7" text-anchor="middle" opacity="0.85">local vars</text>
  <text x="200" y="118" font-family="monospace" font-size="8.5" fill="#fff"    text-anchor="middle" font-weight="bold">ret addr !</text>
  <text x="200" y="141" font-family="monospace" font-size="8.5" fill="#fef3c7" text-anchor="middle" opacity="0.8">padding</text>
  <text x="200" y="163" font-family="monospace" font-size="7.5" fill="#fde68a" text-anchor="middle">AAAA…overflow</text>

  <!-- Overflow arrow curving up from buffer to ret addr -->
  <path d="M248,168 Q274,136 248,106" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.8" stroke-linecap="round"/>
  <polyline points="248,106 243,113 253,113" stroke="#ef4444" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Binary digits (decorative, same as crypto SVG) -->
  <text x="72"  y="60"  font-family="monospace" font-size="13" fill="#fbbf24" opacity="0.7">01</text>
  <text x="102" y="130" font-family="monospace" font-size="11" fill="#fbbf24" opacity="0.5">10</text>
  <text x="58"  y="178" font-family="monospace" font-size="13" fill="#fbbf24" opacity="0.6">11</text>
  <text x="305" y="65"  font-family="monospace" font-size="11" fill="#fbbf24" opacity="0.5">10</text>
  <text x="315" y="132" font-family="monospace" font-size="13" fill="#fbbf24" opacity="0.6">01</text>
  <text x="118" y="46"  font-family="monospace" font-size="10" fill="#fbbf24" opacity="0.4">0110</text>
  <text x="260" y="46"  font-family="monospace" font-size="10" fill="#fbbf24" opacity="0.4">1001</text>

  <!-- Hex shellcode strip -->
  <text x="200" y="216" font-family="monospace" font-size="8" fill="#d97706" opacity="0.38" text-anchor="middle">41 41 41 41  90 90 90  /bin/sh</text>

  <!-- Bug icon bottom-left (same as hacking SVG) -->
  <g transform="translate(68,200)" opacity="0.42">
    <ellipse cx="0" cy="4" rx="7" ry="9" stroke="#d97706" stroke-width="1.8" fill="none"/>
    <circle  cx="0" cy="-5" r="4.5"      stroke="#d97706" stroke-width="1.8" fill="none"/>
    <line x1="-7" y1="0"  x2="-14" y2="-4" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="4"  x2="-14" y2="4"  stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="9"  x2="-14" y2="13" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="0"  x2="14"  y2="-4" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="4"  x2="14"  y2="4"  stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7"  y1="9"  x2="14"  y2="13" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Gear icon bottom-right -->
  <g transform="translate(322,193)" opacity="0.38">
    <circle cx="0" cy="0" r="13" stroke="#b45309" stroke-width="2" fill="none"/>
    <circle cx="0" cy="0" r="5"  stroke="#b45309" stroke-width="2" fill="none"/>
    <line x1="0"    y1="-13" x2="0"    y2="-17" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="0"    y1="13"  x2="0"    y2="17"  stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="-13"  y1="0"   x2="-17"  y2="0"   stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="13"   y1="0"   x2="17"   y2="0"   stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9.2" y1="-9.2" x2="-12" y2="-12" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="9.2"  y1="9.2"  x2="12"  y2="12"  stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="9.2"  y1="-9.2" x2="12"  y2="-12" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9.2" y1="9.2"  x2="-12" y2="12"  stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Magnifying glass top-right (fuzzing) -->
  <g transform="translate(320,82)" opacity="0.40">
    <circle cx="0" cy="0" r="14" stroke="#b45309" stroke-width="2" fill="none"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#b45309" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Corner dots -->
  <circle cx="48"  cy="45"  r="2"   fill="#fbbf24" opacity="0.4"/>
  <circle cx="355" cy="40"  r="2"   fill="#fbbf24" opacity="0.4"/>
  <circle cx="42"  cy="230" r="2"   fill="#fbbf24" opacity="0.3"/>
  <circle cx="358" cy="228" r="2"   fill="#fbbf24" opacity="0.3"/>
  <circle cx="200" cy="32"  r="1.5" fill="#fbbf24" opacity="0.3"/>
</svg>
