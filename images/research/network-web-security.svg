<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg-nw" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="accent-nw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#bg-nw)"/>

  <!-- Network nodes left (same pattern as hacking SVG) -->
  <circle cx="52" cy="90"  r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <circle cx="52" cy="130" r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <circle cx="52" cy="170" r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <line x1="61" y1="90"  x2="148" y2="112" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="61" y1="130" x2="148" y2="125" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="61" y1="170" x2="148" y2="138" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="99"  x2="52" y2="121"  stroke="#0891b2" stroke-width="1.2" opacity="0.35"/>
  <line x1="52" y1="139" x2="52" y2="161"  stroke="#0891b2" stroke-width="1.2" opacity="0.35"/>

  <!-- Network nodes right -->
  <circle cx="348" cy="90"  r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <circle cx="348" cy="130" r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <circle cx="348" cy="170" r="9" stroke="#0891b2" stroke-width="2" fill="#a5f3fc" opacity="0.75"/>
  <line x1="252" y1="112" x2="339" y2="90"  stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="252" y1="125" x2="339" y2="130" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="252" y1="138" x2="339" y2="170" stroke="#0891b2" stroke-width="1.5" opacity="0.5"/>
  <line x1="348" y1="99"  x2="348" y2="121" stroke="#0891b2" stroke-width="1.2" opacity="0.35"/>
  <line x1="348" y1="139" x2="348" y2="161" stroke="#0891b2" stroke-width="1.2" opacity="0.35"/>

  <!-- Central globe -->
  <circle cx="200" cy="125" r="52" stroke="#0891b2" stroke-width="2" fill="#ecfeff" fill-opacity="0.55" opacity="0.9"/>
  <!-- Latitude line -->
  <ellipse cx="200" cy="125" rx="52" ry="18" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.28"/>
  <!-- Longitude ellipse -->
  <ellipse cx="200" cy="125" rx="26" ry="52" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.28"/>
  <!-- Cross lines -->
  <line x1="148" y1="125" x2="252" y2="125" stroke="#0891b2" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="73"  x2="200" y2="177" stroke="#0891b2" stroke-width="1" opacity="0.25"/>

  <!-- HTTPS lock on globe (center) -->
  <g transform="translate(200,110)" opacity="0.88">
    <rect x="-11" y="-2" width="22" height="18" rx="3" fill="#0891b2" opacity="0.85"/>
    <path d="M-7,-2 V-9 A7 7 0 0 1 7,-9 V-2" stroke="#0891b2" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="8"  r="3"   fill="#cffafe"/>
    <line x1="0" y1="11" x2="0" y2="13" stroke="#cffafe" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Warning triangle (vulnerability indicator) -->
  <g transform="translate(200,152)" opacity="0.72">
    <polygon points="0,-10 9,6 -9,6" stroke="#ef4444" stroke-width="1.8" fill="#fee2e2" opacity="0.85"/>
    <line x1="0" y1="-5" x2="0" y2="1" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="4" r="1" fill="#ef4444"/>
  </g>

  <!-- SQL injection hint bottom-left -->
  <text x="62" y="212" font-family="monospace" font-size="8.5" fill="#0e7490" opacity="0.48">' OR 1=1 --</text>

  <!-- Shield bottom-right (defense) -->
  <g transform="translate(322,192)" opacity="0.38">
    <path d="M0,-18 L16,-8 L14,10 L0,20 L-14,10 L-16,-8 Z" stroke="#0e7490" stroke-width="2" fill="none"/>
    <polyline points="-7,3 -1,10 10,-5" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Corner dots -->
  <circle cx="48"  cy="45"  r="2"   fill="#22d3ee" opacity="0.5"/>
  <circle cx="355" cy="40"  r="2"   fill="#22d3ee" opacity="0.45"/>
  <circle cx="42"  cy="230" r="2"   fill="#22d3ee" opacity="0.35"/>
  <circle cx="358" cy="228" r="2"   fill="#22d3ee" opacity="0.35"/>
  <circle cx="200" cy="32"  r="1.5" fill="#22d3ee" opacity="0.3"/>
  <circle cx="200" cy="232" r="1.5" fill="#22d3ee" opacity="0.3"/>
</svg>
