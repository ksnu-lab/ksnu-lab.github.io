      <stop offset="0%" style="stop-color:#ff2244;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ff2244;stop-opacity:0" />
    </radialGradient>
    <!-- Scanline pattern -->
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#00ff41" opacity="0.012"/>
    </pattern>
  </defs>

