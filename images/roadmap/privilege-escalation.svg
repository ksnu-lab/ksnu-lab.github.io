<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#fef2f2"/>
  <!-- Steps/stairs -->
  <rect x="20" y="85" width="30" height="15" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <rect x="45" y="65" width="30" height="35" rx="3" fill="#fde68a" stroke="#f59e0b" stroke-width="1"/>
  <rect x="70" y="45" width="30" height="55" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="35" y="95" text-anchor="middle" font-size="7" font-family="sans-serif" font-weight="bold" fill="#6b7280">user</text>
  <text x="60" y="82" text-anchor="middle" font-size="7" font-family="sans-serif" font-weight="bold" fill="#92400e">sudo</text>
  <text x="85" y="72" text-anchor="middle" font-size="7" font-family="sans-serif" font-weight="bold" fill="#dc2626">root</text>
  <!-- Person icon climbing -->
  <circle cx="35" cy="72" r="6" fill="#6b7280"/>
  <line x1="35" y1="78" x2="35" y2="83" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Arrow going up -->
  <path d="M40 70 Q60 30 80 42" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2" fill="none"/>
  <path d="M76 38 L80 42 L75 44" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crown on top -->
  <path d="M79 28 L82 22 L85 26 L88 20 L91 28 Z" fill="#f59e0b"/>
</svg>
