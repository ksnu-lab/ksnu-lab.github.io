<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#eff6ff"/>
  <!-- Person A -->
  <circle cx="25" cy="50" r="10" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="25" y="54" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">A</text>
  <!-- Person B -->
  <circle cx="95" cy="50" r="10" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="54" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">B</text>
  <!-- Attacker in middle -->
  <circle cx="60" cy="50" r="12" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="60" y="46" text-anchor="middle" font-size="7" fill="#dc2626">&#x1f441;</text>
  <text x="60" y="56" text-anchor="middle" font-size="6" font-weight="bold" fill="#dc2626">ATK</text>
  <!-- Arrows -->
  <path d="M36 46 L47 46" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M73 46 L84 46" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M84 54 L73 54" stroke="#3b82f6" stroke-width="1.5"/>
  <path d="M47 54 L36 54" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Arrow heads -->
  <polygon points="47,44 47,48 50,46" fill="#3b82f6"/>
  <polygon points="84,44 84,48 87,46" fill="#3b82f6"/>
  <polygon points="73,52 73,56 70,54" fill="#3b82f6"/>
  <polygon points="36,52 36,56 33,54" fill="#3b82f6"/>
  <!-- Intercepted label -->
  <text x="60" y="80" text-anchor="middle" font-size="7" font-family="monospace" fill="#ef4444">intercepted!</text>
</svg>
