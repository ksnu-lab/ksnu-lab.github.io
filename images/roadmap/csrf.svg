<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#f0fdf4"/>
  <!-- User -->
  <circle cx="25" cy="35" r="10" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="25" y="39" text-anchor="middle" font-size="8" fill="#166534">U</text>
  <!-- Evil site -->
  <rect x="65" y="22" width="40" height="26" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="85" y="33" text-anchor="middle" font-size="6" font-weight="bold" fill="#dc2626">evil</text>
  <text x="85" y="42" text-anchor="middle" font-size="6" fill="#dc2626">.com</text>
  <!-- Target server -->
  <rect x="55" y="72" width="40" height="26" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="75" y="83" text-anchor="middle" font-size="6" font-weight="bold" fill="#166534">bank</text>
  <text x="75" y="92" text-anchor="middle" font-size="6" fill="#166534">.com</text>
  <!-- User visits evil -->
  <path d="M36 32 L63 32" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="61,30 61,34 65,32" fill="#ef4444"/>
  <!-- Forged request -->
  <path d="M85 48 L75 70" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="73,67 77,67 75,71" fill="#ef4444"/>
  <!-- Label -->
  <text x="90" y="60" font-size="6" font-family="monospace" fill="#dc2626">POST</text>
  <text x="90" y="68" font-size="6" font-family="monospace" fill="#dc2626">/transfer</text>
  <!-- Cookie -->
  <rect x="15" y="60" width="35" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="32" y="70" text-anchor="middle" font-size="6" fill="#92400e">cookie</text>
</svg>
