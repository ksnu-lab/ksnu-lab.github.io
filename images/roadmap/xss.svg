<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#f0fdf4"/>
  <!-- Browser window -->
  <rect x="18" y="20" width="84" height="80" rx="6" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="18" y="20" width="84" height="14" rx="6" fill="#f0fdf4"/>
  <circle cx="27" cy="27" r="3" fill="#ef4444"/>
  <circle cx="35" cy="27" r="3" fill="#f59e0b"/>
  <circle cx="43" cy="27" r="3" fill="#22c55e"/>
  <!-- Page content -->
  <rect x="24" y="40" width="72" height="12" rx="3" fill="#f3f4f6"/>
  <rect x="24" y="56" width="72" height="12" rx="3" fill="#f3f4f6"/>
  <!-- Injected script -->
  <rect x="24" y="72" width="72" height="18" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="84" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">&lt;script&gt;alert()&lt;/script&gt;</text>
  <!-- Alert popup -->
  <rect x="35" y="38" width="50" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="60" y="50" text-anchor="middle" font-size="7" font-weight="bold" fill="#92400e">XSS Alert!</text>
</svg>
