<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#faf5ff"/>

  <!-- Input: Plaintext pair with XOR difference -->
  <rect x="12" y="16" width="32" height="14" rx="3" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="28" y="26" text-anchor="middle" font-size="7" font-family="monospace" fill="#5b21b6">P1</text>
  <rect x="76" y="16" width="32" height="14" rx="3" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="92" y="26" text-anchor="middle" font-size="7" font-family="monospace" fill="#5b21b6">P2</text>

  <!-- XOR symbol between inputs -->
  <circle cx="60" cy="23" r="8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="60" y="27" text-anchor="middle" font-size="10" font-weight="bold" fill="#7c3aed">&#x2295;</text>
  <!-- Lines to XOR -->
  <line x1="44" y1="23" x2="52" y2="23" stroke="#7c3aed" stroke-width="1.2"/>
  <line x1="68" y1="23" x2="76" y2="23" stroke="#7c3aed" stroke-width="1.2"/>

  <!-- Input difference label -->
  <text x="60" y="14" text-anchor="middle" font-size="6" fill="#7c3aed" font-weight="bold">&#916;P</text>

  <!-- Arrows down to encryption -->
  <line x1="28" y1="30" x2="28" y2="42" stroke="#7c3aed" stroke-width="1.2"/>
  <polygon points="25,40 31,40 28,44" fill="#7c3aed"/>
  <line x1="92" y1="30" x2="92" y2="42" stroke="#7c3aed" stroke-width="1.2"/>
  <polygon points="89,40 95,40 92,44" fill="#7c3aed"/>

  <!-- Encryption round boxes (multi-round) -->
  <rect x="14" y="44" width="28" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="28" y="53" text-anchor="middle" font-size="6" font-weight="bold" fill="#1e40af">Round 1</text>
  <rect x="78" y="44" width="28" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="92" y="53" text-anchor="middle" font-size="6" font-weight="bold" fill="#1e40af">Round 1</text>

  <rect x="14" y="60" width="28" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="28" y="69" text-anchor="middle" font-size="6" font-weight="bold" fill="#1e40af">Round 2</text>
  <rect x="78" y="60" width="28" height="12" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="92" y="69" text-anchor="middle" font-size="6" font-weight="bold" fill="#1e40af">Round 2</text>

  <!-- Dots for more rounds -->
  <text x="28" y="80" text-anchor="middle" font-size="8" fill="#93c5fd">...</text>
  <text x="92" y="80" text-anchor="middle" font-size="8" fill="#93c5fd">...</text>

  <!-- Output: Ciphertext pair -->
  <rect x="12" y="84" width="32" height="14" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.2"/>
  <text x="28" y="94" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">C1</text>
  <rect x="76" y="84" width="32" height="14" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.2"/>
  <text x="92" y="94" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">C2</text>

  <!-- XOR at output -->
  <circle cx="60" cy="91" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">&#x2295;</text>
  <line x1="44" y1="91" x2="52" y2="91" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="68" y1="91" x2="76" y2="91" stroke="#ef4444" stroke-width="1.2"/>

  <!-- Output difference arrow to key -->
  <line x1="60" y1="99" x2="60" y2="107" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="57,105 63,105 60,109" fill="#ef4444"/>
  <text x="60" y="114" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="#dc2626">&#916;C &#x2192; Key</text>
</svg>
