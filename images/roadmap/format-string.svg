<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#fef2f2"/>
  <!-- Code box -->
  <rect x="18" y="22" width="84" height="76" rx="6" fill="#1f2937"/>
  <!-- Code lines -->
  <text x="24" y="38" font-size="7" font-family="monospace" fill="#9ca3af">printf(</text>
  <text x="24" y="50" font-size="8" font-family="monospace" fill="#ef4444" font-weight="bold">  user_input</text>
  <text x="24" y="62" font-size="7" font-family="monospace" fill="#9ca3af">);</text>
  <!-- Format specifiers -->
  <text x="24" y="80" font-size="9" font-family="monospace" fill="#22c55e">%x %x %x %n</text>
  <!-- Arrow from input to printf -->
  <path d="M60 86 L60 65" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Warning badge -->
  <circle cx="92" cy="30" r="8" fill="#ef4444" opacity="0.3"/>
  <text x="92" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#ef4444">!</text>
</svg>
