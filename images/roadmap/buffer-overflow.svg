<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#fef2f2"/>
  <!-- Stack frames -->
  <rect x="30" y="20" width="60" height="14" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="30" text-anchor="middle" font-size="8" font-family="monospace" fill="#991b1b">RET ADDR</text>
  <rect x="30" y="38" width="60" height="14" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="60" y="48" text-anchor="middle" font-size="8" font-family="monospace" fill="#374151">EBP</text>
  <rect x="30" y="56" width="60" height="14" rx="3" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="60" y="66" text-anchor="middle" font-size="8" font-family="monospace" fill="#374151">BUFFER</text>
  <!-- Overflow arrow -->
  <path d="M60 90 L60 72" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M55 77 L60 72 L65 77" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Overflow data -->
  <text x="60" y="100" text-anchor="middle" font-size="9" font-family="monospace" font-weight="bold" fill="#dc2626">AAAA...</text>
  <!-- Warning -->
  <circle cx="90" cy="25" r="8" fill="#ef4444" opacity="0.2"/>
  <text x="90" y="28" text-anchor="middle" font-size="10" fill="#ef4444">!</text>
</svg>
