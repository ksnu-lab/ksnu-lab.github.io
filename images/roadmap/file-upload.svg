<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#f0fdf4"/>
  <!-- Upload area -->
  <rect x="25" y="22" width="70" height="45" rx="6" fill="white" stroke="#86efac" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Upload arrow -->
  <path d="M60 55 L60 38" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M53 44 L60 38 L67 44" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Malicious file -->
  <rect x="42" y="30" width="36" height="12" rx="3" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="39" text-anchor="middle" font-size="6" font-family="monospace" fill="#dc2626">shell.php</text>
  <!-- Server -->
  <rect x="35" y="78" width="50" height="22" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="92" text-anchor="middle" font-size="7" font-weight="bold" fill="#166534">Web Server</text>
  <!-- Arrow down -->
  <path d="M60 67 L60 76" stroke="#ef4444" stroke-width="2"/>
  <polygon points="57,74 63,74 60,78" fill="#ef4444"/>
  <!-- Webshell output -->
  <text x="60" y="106" text-anchor="middle" font-size="6" font-family="monospace" fill="#dc2626">cmd: whoami</text>
</svg>
