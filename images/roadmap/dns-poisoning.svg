<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="12" fill="#eff6ff"/>
  <!-- DNS server -->
  <rect x="40" y="18" width="40" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="30" text-anchor="middle" font-size="7" font-weight="bold" fill="#1e40af">DNS</text>
  <text x="60" y="40" text-anchor="middle" font-size="6" fill="#3b82f6">Server</text>
  <!-- Poisoned entry -->
  <rect x="20" y="55" width="80" height="18" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="67" text-anchor="middle" font-size="7" font-family="monospace" fill="#dc2626">bank.com = evil.ip</text>
  <!-- Arrow inject -->
  <path d="M60 46 L60 55" stroke="#ef4444" stroke-width="2"/>
  <polygon points="57,53 63,53 60,57" fill="#ef4444"/>
  <!-- User query -->
  <circle cx="30" cy="92" r="8" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="30" y="95" text-anchor="middle" font-size="7" fill="#1e40af">?</text>
  <!-- Redirect arrow -->
  <path d="M38 88 L75 78" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Skull on evil server -->
  <rect x="75" y="82" width="28" height="18" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="89" y="94" text-anchor="middle" font-size="8" fill="#dc2626">evil</text>
</svg>
